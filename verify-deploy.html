<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover,shrink-to-fit=no">
<!-- 微信/QQ浏览器专属 -->
<meta name="x5-orientation" content="portrait">
<meta name="x5-fullscreen" content="true">
<meta name="x5-page-mode" content="app">
<meta name="format-detection" content="telephone=no,email=no,address=no">
<!-- iOS Safari -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="识字训练">
<title>小学识字训练 · 国标3000字库</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;tap-highlight-color:transparent}
  html{touch-action:manipulation;-webkit-text-size-adjust:100%;text-size-adjust:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif;background:#f4f6f9;min-height:100vh;color:#2c2c2a;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;user-select:none;-webkit-user-select:none}
  .app{max-width:1100px;margin:0 auto;padding:10px 12px}
  .header{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:12px;border:0.5px solid rgba(0,0,0,0.1);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
  .header h1{font-size:17px;font-weight:500;color:#185fa5}
  .header-stats{display:flex;gap:6px;flex-wrap:wrap}
  .stat-chip{background:#e6f1fb;color:#185fa5;border-radius:20px;padding:4px 10px;font-size:11px;font-weight:500}
  .stat-chip.green{background:#eaf3de;color:#3b6d11}
  .stat-chip.amber{background:#faeeda;color:#854f0b}
  .stat-chip.red{background:#fcebeb;color:#a32d2d}
  .tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{background:#fff;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:10px 14px;cursor:pointer;font-size:14px;color:#5f5e5a;transition:all .15s;white-space:nowrap;min-height:44px;display:inline-flex;align-items:center}
  .tab:active{border-color:#378add;color:#185fa5;background:#e6f1fb}
  .tab.active{background:#185fa5;color:#fff;border-color:#185fa5}
  .tab.active:active{background:#0c447c}
  .panel{display:none}
  .panel.active{display:block}
  .card{background:#fff;border-radius:12px;border:0.5px solid rgba(0,0,0,0.1);padding:14px 16px;margin-bottom:12px}
  .card-title{font-size:15px;font-weight:500;color:#0c447c;margin-bottom:14px;padding-bottom:10px;border-bottom:0.5px solid rgba(0,0,0,0.08)}
  .search-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
  .search-bar input{flex:1;min-width:120px;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;padding:10px 14px;font-size:16px;outline:none;-webkit-appearance:none;appearance:none}
  .search-bar input:focus{border-color:#378add}
  .search-bar select{border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;padding:10px 12px;font-size:14px;outline:none;color:#444;background:#fff;-webkit-appearance:none;appearance:none;min-height:44px}
  .btn{border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;padding:10px 18px;cursor:pointer;font-size:14px;background:#fff;color:#444;transition:all .15s;min-height:44px;min-width:44px;display:inline-flex;align-items:center;justify-content:center}
  .btn:active{border-color:#378add;color:#185fa5;background:#e6f1fb}
  .btn.primary{background:#185fa5;color:#fff;border-color:#185fa5}
  .btn.primary:active{background:#0c447c}
  .btn.danger{background:#a32d2d;color:#fff;border-color:#a32d2d}
  .btn.danger:active{background:#7a2222}
  .btn.success{background:#3b6d11;color:#fff;border-color:#3b6d11}
  .btn.success:active{background:#2a4e0c}
  .btn.amber{background:#854f0b;color:#fff;border-color:#854f0b}
  .btn.amber:active{background:#613908}
  .char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:8px}
  .char-cell{background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:10px;padding:10px 6px 8px;text-align:center;cursor:pointer;transition:all .15s;position:relative;min-height:68px;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .char-cell:active{border-color:#378add;background:#e6f1fb}
  .char-cell .zi{font-size:24px;font-weight:400;color:#2c2c2a;display:block;line-height:1.2}
  .char-cell .py{font-size:10px;color:#888;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
  .char-cell .grade-dot{position:absolute;top:3px;right:4px;width:5px;height:5px;border-radius:50%;background:#c0dd97}
  .char-cell.mastered .grade-dot{background:#639922}
  .char-cell.wrong .grade-dot{background:#e24b4a}
  .char-cell.wrong{background:#ffe0e0;border-color:#ff8080}
  .detail-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;height:100dvh;background:rgba(0,0,0,0.35);z-index:100;align-items:center;justify-content:center;-webkit-overflow-scrolling:touch}
  .detail-overlay.open{display:flex}
  .detail-box{background:#fff;border-radius:16px;padding:20px 18px;max-width:560px;width:92%;max-height:85vh;max-height:85dvh;overflow-y:auto;position:relative;-webkit-overflow-scrolling:touch}
  .detail-close{position:absolute;top:10px;right:14px;cursor:pointer;font-size:24px;color:#888;border:none;background:none;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;padding:0}
  .detail-char{font-size:64px;text-align:center;font-weight:400;color:#185fa5;line-height:1;margin-bottom:4px}
  .detail-pinyin{text-align:center;font-size:20px;color:#5f5e5a;margin-bottom:4px}
  .detail-meaning{font-size:14px;color:#5f5e5a;text-align:center;margin-bottom:14px;padding:8px 12px;background:#e6f1fb;border-radius:8px}
  .reading-box{background:#f4f6f9;border-radius:10px;padding:14px 16px;margin-bottom:12px}
  .reading-title{font-size:12px;color:#888;margin-bottom:6px;font-weight:500}
  .reading-text{font-size:15px;line-height:2;color:#2c2c2a}
  .reading-text .key-char{color:#185fa5;font-weight:500;border-bottom:2px solid #378add;cursor:pointer}
  .detail-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:14px}
  .detail-actions .btn{flex:0 1 auto}
  .progress-bar-wrap{background:#f1efe8;border-radius:4px;height:8px;margin-bottom:4px}
  .progress-bar{height:8px;border-radius:4px;background:#3b6d11;transition:width .4s}
  .quiz-area{max-width:640px;margin:0 auto}
  .quiz-char{font-size:64px;text-align:center;font-weight:400;color:#185fa5;padding:20px 0;line-height:1}
  .quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}
  .quiz-opt{border:0.5px solid rgba(0,0,0,0.18);border-radius:10px;padding:14px 12px;text-align:center;cursor:pointer;font-size:15px;background:#fff;transition:all .15s;min-height:48px;display:flex;align-items:center;justify-content:center;word-break:break-word}
  .quiz-opt:active{border-color:#378add;background:#e6f1fb}
  .quiz-opt.correct{background:#eaf3de;border-color:#639922;color:#3b6d11}
  .quiz-opt.wrong{background:#ff2d2d;border-color:#ff2d2d;color:#fff;font-weight:700}
  .quiz-result{text-align:center;padding:16px;font-size:15px;font-weight:500}
  .quiz-result.ok{color:#3b6d11}
  .quiz-result.fail{color:#a32d2d}
  .wrong-list{display:grid;grid-template-columns:1fr;gap:8px}
  .wrong-item{background:#fcebeb;border:0.5px solid #f09595;border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;min-height:56px}
  .wrong-item:active{background:#f9d6d6}
  .wrong-item .wi-char{font-size:28px;color:#a32d2d;min-width:32px;text-align:center}
  .wrong-item .wi-info{flex:1;min-width:0}
  .wrong-item .wi-py{font-size:11px;color:#888}
  .wrong-item .wi-meaning{font-size:11px;color:#5f5e5a;margin-top:2px}
  .wrong-item .wi-cnt{font-size:11px;color:#e24b4a;background:#fcebeb;border:0.5px solid #f09595;border-radius:10px;padding:2px 8px;white-space:nowrap;flex-shrink:0}
  .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
  .badge-grade1{background:#eaf3de;color:#3b6d11}
  .badge-grade2{background:#e6f1fb;color:#185fa5}
  .badge-grade3{background:#faeeda;color:#854f0b}
  .badge-grade4{background:#fcebeb;color:#a32d2d}
  .badge-grade5{background:#eeedfe;color:#534ab7}
  .badge-grade6{background:#fbeaf0;color:#993556}
  .empty-tip{text-align:center;padding:40px 20px;color:#888;font-size:14px}
  .filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
  .filter-row label{font-size:13px;color:#5f5e5a;flex-shrink:0}
  .grade-btns{display:flex;gap:6px;flex-wrap:wrap}
  .grade-btn{border:0.5px solid rgba(0,0,0,0.15);border-radius:16px;padding:6px 14px;cursor:pointer;font-size:12px;background:#fff;color:#5f5e5a;transition:all .15s;min-height:34px;display:inline-flex;align-items:center;white-space:nowrap}
  .grade-btn:active,.grade-btn.active{background:#185fa5;color:#fff;border-color:#185fa5}
  .read-mode-text{font-size:16px;line-height:2.2;color:#2c2c2a;background:#fff;border-radius:10px;padding:16px 18px;border:0.5px solid rgba(0,0,0,0.1);-webkit-user-select:text;user-select:text}
  .read-mode-text .key-char{color:#185fa5;font-weight:500;border-bottom:2px solid #378add;cursor:pointer}
  .metric-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
  .metric{background:#f4f6f9;border-radius:8px;padding:12px 14px}
  .metric .m-label{font-size:12px;color:#888;margin-bottom:4px}
  .metric .m-val{font-size:22px;font-weight:500;color:#2c2c2a}
  .metric .m-val.blue{color:#185fa5}
  .metric .m-val.green{color:#3b6d11}
  .sentence-card{background:#f0f9f0;border:0.5px solid #a8d5a2;border-radius:12px;padding:16px;margin-bottom:14px}
  .sentence-card .sentence-num{font-size:11px;color:#3b6d11;font-weight:500;margin-bottom:6px}
  .sentence-card .sentence-text{font-size:16px;line-height:2;color:#2c2c2a;margin-bottom:8px}
  .sentence-card .sentence-text .highlight{color:#3b6d11;font-weight:500;border-bottom:2px solid #639922;cursor:pointer}
  .sentence-card .sentence-answer{font-size:14px;color:#5f5e5a;margin-top:8px;padding:8px 12px;background:#fff;border-radius:8px;border:0.5px solid rgba(0,0,0,0.1)}
  .sentence-card .sentence-answer b{color:#3b6d11}
  .sentence-nav{display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap}
  .metric .m-val.red{color:#a32d2d}
  .metric .m-val.amber{color:#854f0b}
  .detail-radical-stroke{display:flex;gap:10px;justify-content:center;margin-bottom:10px;flex-wrap:wrap}
  .radical-tag{background:#e6f1fb;color:#185fa5;border-radius:16px;padding:4px 14px;font-size:12px;font-weight:500}
  .stroke-tag{background:#faeeda;color:#854f0b;border-radius:16px;padding:4px 14px;font-size:12px;font-weight:500}
  .stroke-hint{font-size:10px;color:#aaa;text-align:center;margin-top:2px}
  .char-cell:active .stroke-hint{color:#888}
  .stroke-order-opt{font-size:12px!important;line-height:1.5!important;word-break:break-all}
  #quiz-extra-info{margin-top:8px}
  /* 平板及以上 */
  @media(min-width:768px){
    .app{padding:16px 20px}
    .header{padding:20px 24px}
    .header h1{font-size:20px}
    .stat-chip{padding:4px 12px;font-size:12px}
    .tab{padding:8px 18px;font-size:13px;min-height:auto}
    .card{padding:20px 24px}
    .char-grid{grid-template-columns:repeat(auto-fill,minmax(72px,1fr))}
    .char-cell{padding:12px 8px;min-height:auto}
    .char-cell .zi{font-size:26px}
    .char-cell .py{font-size:11px}
    .char-cell .grade-dot{top:4px;right:6px;width:6px;height:6px}
    .detail-box{padding:28px 32px;width:90%}
    .detail-char{font-size:72px}
    .detail-pinyin{font-size:22px}
    .quiz-char{font-size:80px;padding:24px 0}
    .metric{grid-template-columns:repeat(auto-fit,minmax(130px,1fr))}
    .wrong-list{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
    .metric-grid{grid-template-columns:repeat(auto-fit,minmax(130px,1fr))}
  }
  /* 横屏手机适配 */
  @media(max-width:480px){
    .char-grid{grid-template-columns:repeat(auto-fill,minmax(56px,1fr));gap:6px}
    .char-cell{padding:8px 4px 6px;min-height:60px}
    .char-cell .zi{font-size:22px}
    .quiz-options{grid-template-columns:1fr;gap:8px}
    .tab{padding:8px 10px;font-size:13px}
    .btn{padding:10px 14px;font-size:13px}
    .header h1{font-size:15px}
    .detail-box{padding:16px 14px}
    .detail-char{font-size:52px}
    .quiz-char{font-size:52px;padding:16px 0}
    @keyframes bounce{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-10px)}
    }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>小学识字训练 · 国标生字库</h1>
    <div class="header-stats">
      <span class="stat-chip" id="hd-total">字库：0字</span>
      <span class="stat-chip green" id="hd-mastered">已掌握：0字</span>
      <span class="stat-chip amber" id="hd-progress">完成率：0%</span>
      <span class="stat-chip red" id="hd-wrong">错题：0字</span>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" data-tab="browse" onclick="switchTab('browse',this)">字库浏览</button>
    <button class="tab" data-tab="reading" onclick="switchTab('reading',this)">阅读练习</button>
    <button class="tab" data-tab="quiz" onclick="switchTab('quiz',this)">识字自测</button>
    <button class="tab" data-tab="wrong" onclick="switchTab('wrong',this)">错题本</button>
    <button class="tab" data-tab="stats" onclick="switchTab('stats',this)">学习统计</button>
  </div>

  <!-- 字库浏览 -->
  <div class="panel active" id="panel-browse">
    <div class="card">
      <div class="card-title">字库浏览 · 按年级筛选</div>
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="搜索汉字或拼音…" oninput="renderGrid()">
        <select id="search-grade" onchange="renderGrid()">
          <option value="">全部年级</option>
          <option value="1">一年级</option>
          <option value="2">二年级</option>
          <option value="3">三年级</option>
          <option value="4">四年级</option>
          <option value="5">五年级</option>
          <option value="6">六年级</option>
        </select>
        <button class="btn primary" onclick="renderGrid()">搜索</button>
      </div>
      <div class="filter-row">
        <label>状态：</label>
        <div class="grade-btns">
          <button class="grade-btn active" data-filter="all" onclick="setFilter(this,'all')">全部</button>
          <button class="grade-btn" data-filter="mastered" onclick="setFilter(this,'mastered')">已掌握</button>
          <button class="grade-btn" data-filter="wrong" onclick="setFilter(this,'wrong')">错题</button>
          <button class="grade-btn" data-filter="unlearned" onclick="setFilter(this,'unlearned')">未学</button>
        </div>
      </div>
      <div id="char-grid" class="char-grid"></div>
      <div style="margin-top:12px;text-align:right;font-size:12px;color:#888" id="grid-count"></div>
    </div>
  </div>

  <!-- 阅读练习 -->
  <div class="panel" id="panel-reading">
    <div class="card">
      <div class="card-title">阅读练习 · 点击蓝色字可查看详情</div>
      <div class="search-bar">
        <input type="text" id="read-search" placeholder="输入汉字查找专属小故事…" oninput="renderReading()">
        <select id="read-grade" onchange="renderReading()">
          <option value="">全部年级</option>
          <option value="1">一年级</option>
          <option value="2">二年级</option>
          <option value="3">三年级</option>
          <option value="4">四年级</option>
          <option value="5">五年级</option>
          <option value="6">六年级</option>
        </select>
        <button class="btn primary" onclick="pickRandomReading()">随机一篇</button>
      </div>
      <div id="reading-list"></div>
    </div>
  </div>

  <!-- 识字自测 -->
  <div class="panel" id="panel-quiz">
    <div class="card">
      <div class="card-title">识字自测</div>
      <div class="filter-row">
        <label>出题范围：</label>
        <div class="grade-btns" id="quiz-grade-btns">
          <button class="grade-btn active" data-qg="all" onclick="setQuizGrade(this,'all')">全部</button>
          <button class="grade-btn" data-qg="1" onclick="setQuizGrade(this,'1')">一年级</button>
          <button class="grade-btn" data-qg="2" onclick="setQuizGrade(this,'2')">二年级</button>
          <button class="grade-btn" data-qg="3" onclick="setQuizGrade(this,'3')">三年级</button>
          <button class="grade-btn" data-qg="4" onclick="setQuizGrade(this,'4')">四年级</button>
          <button class="grade-btn" data-qg="5" onclick="setQuizGrade(this,'5')">五年级</button>
          <button class="grade-btn" data-qg="6" onclick="setQuizGrade(this,'6')">六年级</button>
          <button class="grade-btn" data-qg="wrong" onclick="setQuizGrade(this,'wrong')">错题专练</button>
        </div>
      </div>
      <div class="filter-row">
        <label>题型：</label>
        <div class="grade-btns">
          <button class="grade-btn active" data-qt="char2py" onclick="setQuizType(this,'char2py')">字→拼音</button>
          <button class="grade-btn" data-qt="py2char" onclick="setQuizType(this,'py2char')">拼音→字</button>
          <button class="grade-btn" data-qt="char2meaning" onclick="setQuizType(this,'char2meaning')">字→释义</button>
          <button class="grade-btn" data-qt="char2radical" onclick="setQuizType(this,'char2radical')">字→部首</button>
          <button class="grade-btn" data-qt="char2stroke" onclick="setQuizType(this,'char2stroke')">字→笔画顺序</button>
        </div>
      </div>
      <div class="quiz-area" id="quiz-area">
        <div class="empty-tip">点击"开始测试"进入自测模式</div>
        <div style="text-align:center;margin-top:16px">
          <button class="btn primary" onclick="startQuiz()">开始测试</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 错题本 -->
  <div class="panel" id="panel-wrong">
    <div class="card">
      <div class="card-title">错题本</div>
      <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
        <button class="btn primary" onclick="startQuizFromWrong()">错题专练</button>
        <button class="btn success" onclick="startSentencePractice()">造句专练</button>
        <button class="btn danger" onclick="clearWrong()">清空错题</button>
      </div>
      <div id="wrong-list"></div>
      <div id="sentence-practice-area" style="display:none;margin-top:16px"></div>
    </div>
  </div>

  <!-- 学习统计 -->
  <div class="panel" id="panel-stats">
    <div class="card">
      <div class="card-title">学习统计</div>
      <div class="metric-grid" id="stats-metrics"></div>
      <div class="progress-bar-wrap" style="margin-bottom:16px">
        <div class="progress-bar" id="stats-pbar"></div>
      </div>
      <div id="stats-grade-chart" style="margin-top:8px"></div>
      <div style="margin-top:16px">
        <h3 style="font-size:13px;font-weight:500;color:#0c447c;margin-bottom:10px">各年级进度</h3>
        <div id="grade-progress-list"></div>
      </div>
    </div>
  </div>
</div>

<!-- 字详情弹窗 -->
<div class="detail-overlay" id="detail-overlay" onclick="closeDetail(event)">
  <div class="detail-box" id="detail-box">
    <button class="detail-close" onclick="closeDetailBtn()">✕</button>
    <div class="detail-char" id="d-char"></div>
    <div class="detail-pinyin" id="d-pinyin"></div>
    <div class="detail-meaning" id="d-meaning"></div>
    <div class="detail-radical-stroke" id="d-radical-stroke"></div>
    <div class="reading-box">
      <div class="reading-title">专属小阅读</div>
      <div class="reading-text" id="d-reading"></div>
    </div>
    <div class="detail-actions">
      <button class="btn success" onclick="markMastered()">已掌握</button>
      <button class="btn danger" onclick="markWrong()">标记错题</button>

// ====================== 状态管理 ======================
let progress = JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
let wrongBook = JSON.parse(localStorage.getItem(WRONG_KEY)||'{}');
let currentFilter = 'all';
let currentQuizGrade = 'all';
let currentQuizType = 'char2py';
let currentDetailChar = null;
let quizState = null;

function saveProgress(){localStorage.setItem(STORAGE_KEY,JSON.stringify(progress));}
function saveWrong(){localStorage.setItem(WRONG_KEY,JSON.stringify(wrongBook));}

function isMastered(char){return progress[char]==='mastered';}
function isWrong(char){return !!wrongBook[char];}
function getWrongCount(char){return wrongBook[char]?.count||0;}

function markAsMastered(char){
  progress[char]='mastered';
  if(wrongBook[char]){delete wrongBook[char];saveWrong();}
  saveProgress();
  updateHeaderStats();
}
function markAsWrong(char,entry){
  if(!wrongBook[char]){wrongBook[char]={count:0,char:char};}
  wrongBook[char].count++;
  wrongBook[char].entry=entry;
  saveWrong();
  updateHeaderStats();
}

function updateHeaderStats(){
  const total=CHARS.length;
  const mastered=CHARS.filter(c=>isMastered(c.char)).length;
  const wrong=Object.keys(wrongBook).length;
  const uniq=new Set(CHARS.map(c=>c.char)).size;
  document.getElementById('hd-total').textContent=`字库：${uniq}字`;
  document.getElementById('hd-mastered').textContent=`已掌握：${mastered}字`;
  document.getElementById('hd-progress').textContent=`完成率：${Math.round(mastered/total*100)}%`;
  document.getElementById('hd-wrong').textContent=`错题：${wrong}字`;
}

// ====================== Tab切换 ======================
function switchTab(name,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  if(btn)btn.classList.add('active');
  else document.querySelector('.tab[data-tab="'+name+'"]').classList.add('active');
  if(name==='browse')renderGrid();
  if(name==='reading')renderReading();
  if(name==='wrong')renderWrongList();
  if(name==='stats')renderStats();
}

// ====================== 字库浏览 ======================
function setFilter(el,val){
  currentFilter=val;
  document.querySelectorAll('.grade-btn').forEach(b=>{if(b.dataset.filter!==undefined)b.classList.remove('active');});
  el.classList.add('active');
  renderGrid();
}

function renderGrid(){
  const q=document.getElementById('search-input').value.trim();
  const g=document.getElementById('search-grade').value;
  let list=CHARS.filter(c=>{
    if(g&&c.grade!==parseInt(g))return false;
    if(q&&!c.char.includes(q)&&!c.pinyin.includes(q))return false;
    if(currentFilter==='mastered'&&!isMastered(c.char))return false;
    if(currentFilter==='wrong'&&!isWrong(c.char))return false;
    if(currentFilter==='unlearned'&&(isMastered(c.char)||isWrong(c.char)))return false;
    return true;
  });
  const grid=document.getElementById('char-grid');
  grid.innerHTML=list.map(c=>`
    <div class="char-cell${isMastered(c.char)?' mastered':''}${isWrong(c.char)?' wrong':''}" onclick="openDetail(${c.id})">
      <div class="grade-dot"></div>
      <span class="zi">${c.char}</span>
      <div class="stroke-hint">${c.strokeCount||'?'}画</div>
    </div>
  `).join('');
  document.getElementById('grid-count').textContent=`共 ${list.length} 个汉字`;
}

// ====================== 字详情弹窗 ======================
function openDetail(id){
  const c=CHARS[id];
  currentDetailChar=c;
  document.getElementById('d-char').textContent=c.char;
  document.getElementById('d-pinyin').textContent=c.pinyin;
  document.getElementById('d-meaning').textContent=c.meaning;
  document.getElementById('d-radical-stroke').innerHTML=`
    <span class="radical-tag">部首：${c.radical||'?'}</span>
    <span class="stroke-tag">笔画：${c.strokeCount||'?'} 画</span>
  `;
  const reading=c.reading.replace(new RegExp(c.char,'g'),`<span class="key-char">${c.char}</span>`);
  document.getElementById('d-reading').innerHTML=reading;
  updateDetailStatus();
  document.getElementById('detail-overlay').classList.add('open');
}
function updateDetailStatus(){
  const c=currentDetailChar;
  if(!c)return;
  const st=document.getElementById('d-status');
  if(isMastered(c.char))st.innerHTML='<span style="color:#3b6d11">✓ 已标记为掌握</span>';
  else if(isWrong(c.char))st.innerHTML=`<span style="color:#a32d2d">✗ 错题（出错 ${getWrongCount(c.char)} 次）</span>`;
  else st.textContent='未学习';
}
function closeDetail(e){if(e.target===document.getElementById('detail-overlay'))closeDetailBtn();}
function closeDetailBtn(){document.getElementById('detail-overlay').classList.remove('open');}
function markMastered(){if(currentDetailChar){markAsMastered(currentDetailChar.char);updateDetailStatus();renderGrid();}}
function markWrong(){if(currentDetailChar){markAsWrong(currentDetailChar.char,currentDetailChar);updateDetailStatus();renderWrongList();}}
function quizThisChar(){
  if(!currentDetailChar)return;
  closeDetailBtn();
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-quiz').classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelector('.tab[data-tab="quiz"]').classList.add('active');
  setTimeout(()=>startQuizSingle(currentDetailChar),200);
}

function pickRandomReading(){
  const g=document.getElementById('read-grade').value;
  let list=CHARS.filter(c=>!g||c.grade===parseInt(g));

  const c=list[Math.floor(Math.random()*list.length)];
  document.getElementById('read-search').value=c.char;
  renderReading();
}

// ====================== 识字自测 ======================
function setQuizGrade(el,val){
  currentQuizGrade=val;
  document.querySelectorAll('#quiz-grade-btns .grade-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}
function setQuizType(el,val){
  currentQuizType=val;
  document.querySelectorAll('[data-qt]').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}

function getQuizPool(){
  if(currentQuizGrade==='wrong'){
    return Object.values(wrongBook).map(w=>CHARS.find(c=>c.char===w.char)).filter(Boolean);
  }
  let pool=CHARS;
  if(currentQuizGrade!=='all')pool=CHARS.filter(c=>c.grade===parseInt(currentQuizGrade));
  return pool;
}

function shuffle(arr){return arr.sort(()=>Math.random()-0.5);}

function startQuiz(){
  const pool=getQuizPool();
  if(pool.length<4){
    document.getElementById('quiz-area').innerHTML='<div class="empty-tip">题目数量不足（至少需要4个汉字），请扩大出题范围</div>';
    return;
  }
  const target=pool[Math.floor(Math.random()*pool.length)];
  showQuizQuestion(target,pool);
}
function startQuizSingle(charObj){
  const pool=CHARS.length>=4?CHARS:CHARS;
  showQuizQuestion(charObj,pool);
}
function startQuizFromWrong(){
  currentQuizGrade='wrong';
  document.querySelectorAll('#quiz-grade-btns .grade-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-qg="wrong"]').classList.add('active');
  const panels=document.querySelectorAll('.panel');
  panels.forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-quiz').classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelector('.tab[data-tab="quiz"]').classList.add('active');
  startQuiz();
}

function showQuizQuestion(target,pool){
  let wrongOpts=shuffle(pool.filter(c=>c.char!==target.char)).slice(0,3);
  let opts=shuffle([target,...wrongOpts]);
  const area=document.getElementById('quiz-area');

  let question='',optHtml='';
  if(currentQuizType==='char2py'){
    question=`<div class="quiz-char">${target.char}</div><div style="text-align:center;color:#888;font-size:13px;margin-bottom:4px">这个字的读音是？</div>`;
    optHtml=opts.map(o=>`<button class="quiz-opt" onclick="checkAnswer(this,'${target.char}','${o.char}','${target.pinyin}','${o.pinyin}')">${o.pinyin}</button>`).join('');
    quizState={target,pool,type:'char2py'};
  }else if(currentQuizType==='py2char'){
    question=`<div class="quiz-char" style="font-size:40px;padding:20px 0">${target.pinyin}</div><div style="text-align:center;color:#888;font-size:13px;margin-bottom:4px">这个读音对应哪个汉字？</div>`;
    optHtml=opts.map(o=>`<button class="quiz-opt" onclick="checkAnswer(this,'${target.char}','${o.char}','${target.char}','${o.char}')">${o.char}</button>`).join('');
    quizState={target,pool,type:'py2char'};
  }else if(currentQuizType==='char2meaning'){
    question=`<div class="quiz-char">${target.char}</div><div style="text-align:center;color:#888;font-size:13px;margin-bottom:4px">这个字的意思是？</div>`;
    optHtml=opts.map(o=>`<button class="quiz-opt" onclick="checkAnswerMeaning(this,'${target.char}','${o.char}')">${o.meaning}</button>`).join('');
    quizState={target,pool,type:'char2meaning'};
  }else if(currentQuizType==='char2radical'){
    question=`<div class="quiz-char">${target.char}</div><div style="text-align:center;color:#888;font-size:13px;margin-bottom:4px">这个字的偏旁部首是？</div>`;
    optHtml=opts.map(o=>`<button class="quiz-opt" onclick="checkAnswerRadical(this,'${target.char}','${o.char}')">${o.radical||'?'}</button>`).join('');
    quizState={target,pool,type:'char2radical'};
  }else if(currentQuizType==='char2stroke'){
    question=`<div class="quiz-char">${target.char}</div><div style="text-align:center;color:#888;font-size:13px;margin-bottom:4px">这个字的笔画顺序是？</div>`;
    // 用其他汉字的笔顺作为干扰项
    let wrongOrders=shuffle(pool.filter(c=>c.char!==target.char&&c.strokeOrder&&c.strokeOrder!==target.strokeOrder)).slice(0,3);
    let orderOpts=shuffle([{char:target.char,order:target.strokeOrder,correct:true},...wrongOrders.map(c=>({char:c.char,order:c.strokeOrder,correct:false}))]);
    optHtml=orderOpts.map(o=>`<button class="quiz-opt stroke-order-opt" onclick="checkAnswerStrokeOrder(this,'${target.char}','${o.order.replace(/'/g,"\\'")}',${o.correct})">${o.order}</button>`).join('');
    quizState={target,pool,type:'char2stroke'};
  }
  area.innerHTML=`
    ${question}
    <div class="quiz-options">${optHtml}</div>
    <div id="quiz-result" class="quiz-result"></div>
    <div id="quiz-extra-info" style="text-align:center;margin-top:6px;display:none"></div>
    <div style="text-align:center;margin-top:12px;display:none" id="quiz-next-btn">
      <button class="btn primary" onclick="startQuiz()">下一题</button>
      <button class="btn amber" onclick="openDetail(${target.id})" style="margin-left:8px">查看详情</button>
    </div>
  `;
}

function checkAnswer(el,targetChar,chosenChar,targetVal,chosenVal){
  if(!el.disabled){
    const correct=(chosenChar===targetChar)||(chosenVal===targetVal);
    revealQuiz(el,targetChar,correct,chosenChar);
  }
}
function checkAnswerMeaning(el,targetChar,chosenChar){
  if(!el.disabled){
    revealQuiz(el,targetChar,chosenChar===targetChar,chosenChar);
  }
}
function checkAnswerRadical(el,targetChar,chosenChar){
  if(!el.disabled){
    const entry=CHARS.find(c=>c.char===targetChar);
    const correct=(entry&&entry.radical===el.textContent);
    revealQuiz(el,targetChar,correct,chosenChar);
  }
}
function checkAnswerStrokeOrder(el,targetChar,correctOrder,isCorrect){
  if(!el.disabled){
    revealQuiz(el,targetChar,isCorrect,isCorrect?targetChar:'');
  }
}
function revealQuiz(el,targetChar,correct,chosenChar){
  document.querySelectorAll('.quiz-opt').forEach(b=>b.disabled=true);
  const entry=CHARS.find(c=>c.char===targetChar);
  const extraInfo=document.getElementById('quiz-extra-info');
  if(correct){
    el.classList.add('correct');
    document.getElementById('quiz-result').className='quiz-result ok';
    document.getElementById('quiz-result').textContent='答对了！';
    markAsMastered(targetChar);
  }else{
    el.classList.add('wrong');
    document.querySelectorAll('.quiz-opt').forEach(b=>{
      if(b.textContent===entry.pinyin||b.textContent===entry.char||b.textContent===entry.meaning||b.textContent===entry.radical||(entry.strokeOrder&&b.textContent===entry.strokeOrder))b.classList.add('correct');
    });
    document.getElementById('quiz-result').className='quiz-result fail';
    let correctInfo='';
    if(quizState.type==='char2radical')correctInfo=`部首：${entry.radical}`;
    else if(quizState.type==='char2stroke')correctInfo=`${entry.strokeOrder}`;
    else correctInfo=`${entry.pinyin} / ${entry.meaning}`;
    document.getElementById('quiz-result').textContent=`答错了！正确答案：${correctInfo}`;
    if(entry)markAsWrong(targetChar,entry);
    renderWrongList();
  }
  // 展示部首和笔画信息
  if(entry&&extraInfo){
    extraInfo.style.display='block';
    extraInfo.innerHTML=`
      <div style="display:inline-flex;gap:16px;background:#e6f1fb;border-radius:10px;padding:8px 18px;font-size:13px;color:#185fa5;margin-top:4px">
        <span>部首：<b>${entry.radical||'?'}</b></span>
        <span>笔画：<b>${entry.strokeCount||'?'} 画</b></span>
      </div>`;
  }
  const nb=document.getElementById('quiz-next-btn');
  if(nb)nb.style.display='block';
  renderGrid();
}

let sentencePracticeData=[];

  const wrongList=Object.values(wrongBook).map(w=>CHARS.find(c=>c.char===w.char)).filter(Boolean);

    alert('至少需要1个错题才能生成造句练习！');

  }
  
  sentencePracticeData=[];

  const practiceCount = Math.min(10, wrongList.length * 2);
  
  for(let i=0; i<practiceCount; i++){

    const randomChar = wrongList[Math.floor(Math.random() * wrongList.length)];

// 为单个生字生成趣味小阅读练习（2-3句日常生活小短文）
function generateFunSentence(charData){
  const char = charData.char;
  const pinyin = charData.pinyin;
  const meaning = charData.meaning;
  const grade = charData.grade || 1;
  
  // 获取生字的常用词和emoji（添加安全检查和默认值）
  const word = getCommonWord({char: char}) || char + char;
  const emoji = (charEmojis && charEmojis[char]) ? charEmojis[char] : '✨';
  
  // 日常生活场景和角色
  const scenes = [
    { location: '家里', subject: '我', companion: '妈妈', action: '做家务' },
    { location: '公园里', subject: '我', companion: '爸爸', action: '散步' },
    { location: '学校里', subject: '我', companion: '同学', action: '学习' },
    { location: '超市里', subject: '我', companion: '奶奶', action: '买东西' },
    { location: '操场上', subject: '我', companion: '朋友', action: '运动' },
    { location: '餐厅里', subject: '我们', companion: '老师', action: '吃饭' },
    { location: '院子里', subject: '弟弟', companion: '妹妹', action: '玩耍' },
    { location: '教室里', subject: '我们', companion: '老师', action: '上课' },
  ];
  
  const scene = scenes[Math.floor(Math.random() * scenes.length)];
  
  // 根据年级生成不同难度的小阅读练习
  let story;
  if(grade <= 2){
    // 低年级：简单日常小故事（2-3句话）
    const templates = [
      () => {
        const parts = [
          `${scene.subject}和${scene.companion}在${scene.location}${scene.action}。`,
          `${scene.subject}看到"${char}"字，想到可以${word}。`,
          `${scene.companion}夸${scene.subject}真聪明${emoji}！`

        return parts.join('');
      },
      () => {
        const parts = [
          `今天${scene.subject}在${scene.location}学习。`,
          `${scene.subject}认识了"${char}"字，还学会了${word}。`,
          `${scene.companion}说：${scene.subject}进步真大！`

        return parts.join('');
      },

        const parts = [

          `${scene.companion}也觉得很有意思${emoji}。`
        ];
        return parts.join('');
      },
    ];
    story = templates[Math.floor(Math.random() * templates.length)]();
  } else {
    // 高年级：稍复杂的小阅读练习（2-3句话）
    const templates = [
      () => {
        const parts = [
          `${scene.subject}和${scene.companion}在${scene.location}度过了一个愉快的下午。`,
          `通过学习"${char}"字，${scene.subject}不仅了解了它的含义"${meaning}"，还学会了${word}这个词。`,
          `这种在日常生活中学习语文的方式，让${scene.subject}觉得很有趣。`
        ];
        return parts.join('');
      },
      () => {
        const parts = [
          `今天在${scene.location}，${scene.subject}和${scene.companion}一起复习了最近学过的生字。`,
          `当看到"${char}"字时，${scene.subject}立刻想到了${word}，还用它造了个句子。`,

          `"${char}"这个字不仅出现在课本里，还能用在${word}这样的日常表达中。`,
          `${scene.companion}告诉${scene.subject}，多观察生活，就能学到更多知识。`

  return {

// 上一题
function prevFunSentence() {
  if (sentenceIndex > 0) {
    sentenceIndex--;
    renderFunSentenceCard();
  }
}

// 下一题
function nextFunSentence() {
  if (sentenceIndex < sentencePracticeData.length - 1) {
    sentenceIndex++;
    renderFunSentenceCard();
  }
}

// 标记学会
function markFunSentenceLearned(){
  setTimeout(()=>{
    if(sentenceIndex<sentencePracticeData.length-1){
      sentenceIndex++;
      renderFunSentenceCard();
    }
  },500);
}

// ====================== 学习统计 ======================
function renderStats(){
  const total=CHARS.length;
  const mastered=CHARS.filter(c=>isMastered(c.char)).length;
  const wrong=Object.keys(wrongBook).length;
  const unlearned=total-mastered-CHARS.filter(c=>!isMastered(c.char)&&isWrong(c.char)).length;
  document.getElementById('stats-metrics').innerHTML=`
    <div class="metric"><div class="m-label">总字库</div><div class="m-val blue">${total}</div></div>
    <div class="metric"><div class="m-label">已掌握</div><div class="m-val green">${mastered}</div></div>
    <div class="metric"><div class="m-label">错题数</div><div class="m-val red">${wrong}</div></div>
    <div class="metric"><div class="m-label">完成率</div><div class="m-val amber">${Math.round(mastered/total*100)}%</div></div>
  `;
  document.getElementById('stats-pbar').style.width=Math.round(mastered/total*100)+'%';

  const grades=[1,2,3,4,5,6];
  const gradeNames=['一年级','二年级','三年级','四年级','五年级','六年级'];
  document.getElementById('grade-progress-list').innerHTML=grades.map((g,i)=>{
    const gChars=CHARS.filter(c=>c.grade===g);
    const gMastered=gChars.filter(c=>isMastered(c.char)).length;
    const gWrong=gChars.filter(c=>isWrong(c.char)).length;
    const pct=gChars.length?Math.round(gMastered/gChars.length*100):0;
    return `<div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
        <span><span class="badge badge-grade${g}">${gradeNames[i]}</span> <span style="color:#5f5e5a">${gChars.length}字</span></span>
        <span style="color:#888">已掌握 ${gMastered} · 错题 ${gWrong} · <b style="color:#185fa5">${pct}%</b></span>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}
